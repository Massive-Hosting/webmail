name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  GO_VERSION: '1.25'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: write
  packages: write

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: cd web && npm ci --ignore-scripts

      - name: Copy MediaPipe + RNNoise assets
        run: |
          cd web
          mkdir -p public/mediapipe/wasm public/mediapipe/models public/rnnoise
          cp node_modules/@mediapipe/tasks-vision/wasm/* public/mediapipe/wasm/
          cp node_modules/@jitsi/rnnoise-wasm/dist/rnnoise.wasm public/rnnoise/
          curl -sL -o public/mediapipe/models/selfie_segmenter.tflite \
            "https://storage.googleapis.com/mediapipe-models/image_segmenter/selfie_segmenter/float16/latest/selfie_segmenter.tflite"

      - name: Build frontend
        run: cd web && npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: web/dist

  build-binaries:
    needs: build-frontend
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: web/dist

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build -tags embedstatic \
            -ldflags "-s -w -X main.version=${{ github.ref_name }}" \
            -o webmail-${{ matrix.suffix }} \
            ./cmd/webmail-api

      - name: Package with migrations
        run: |
          tar czf webmail-${{ matrix.suffix }}.tar.gz \
            webmail-${{ matrix.suffix }} \
            migrations/

      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.suffix }}
          path: webmail-${{ matrix.suffix }}.tar.gz

  docker:
    needs: build-frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: web/dist

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.release
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    needs: [build-binaries, docker]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            webmail-linux-amd64.tar.gz
            webmail-linux-arm64.tar.gz
            webmail-darwin-arm64.tar.gz
          body: |
            ## Quick Start

            ### Prerequisites
            - [Stalwart Mail Server](https://stalw.art) with JMAP enabled
            - PostgreSQL 14+
            - Redis or [Valkey](https://valkey.io)

            ### Docker Compose (easiest)

            ```yaml
            # docker-compose.yml
            services:
              webmail:
                image: ghcr.io/${{ github.repository }}:${{ github.ref_name }}
                ports: ["8095:8095"]
                environment:
                  STALWART_URL: http://stalwart:8081
                  STALWART_ADMIN_TOKEN: your-stalwart-admin-token
                  SECRET_ENCRYPTION_KEY: "$(openssl rand -hex 32)"  # generate once, keep stable
                  WEBMAIL_DATABASE_URL: postgres://webmail:webmail@postgres:5432/webmail
                  VALKEY_URL: redis://valkey:6379/0
                  # Optional: AI assistant
                  # AI_ENABLED: "true"
                  # AI_BASE_URL: https://api.openai.com
                  # AI_API_KEY: sk-...
                  # AI_MODEL: gpt-4o
                  # Optional: Temporal for snooze/scheduled send
                  # TEMPORAL_ADDRESS: temporal:7233
                  # Optional: TURN relay for Wave video calls behind NAT
                  # TURN_SECRET: your-turn-secret
                  # TURN_SERVERS: turn:your-server:3478
                depends_on: [postgres, valkey]

              postgres:
                image: postgres:17-alpine
                environment:
                  POSTGRES_DB: webmail
                  POSTGRES_USER: webmail
                  POSTGRES_PASSWORD: webmail
                volumes: ["pgdata:/var/lib/postgresql/data"]

              valkey:
                image: valkey/valkey:8-alpine

              # Optional: enables snooze and scheduled send
              # temporal:
              #   image: temporalio/auto-setup:latest
              #   ports: ["7233:7233"]

            volumes:
              pgdata:
            ```

            ```bash
            docker compose up -d
            ```

            The webmail runs database migrations automatically on startup.
            Open http://localhost:8095 and log in with any Stalwart email account.

            ### Docker (single container)
            ```bash
            docker run -d \
              -e STALWART_URL=http://your-stalwart:8081 \
              -e STALWART_ADMIN_TOKEN=your-admin-token \
              -e SECRET_ENCRYPTION_KEY=$(openssl rand -hex 32) \
              -e WEBMAIL_DATABASE_URL=postgres://user:pass@host:5432/webmail \
              -e VALKEY_URL=redis://host:6379/0 \
              -p 8095:8095 \
              ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ```

            ### Binary
            ```bash
            tar xzf webmail-linux-amd64.tar.gz
            # Run migrations
            goose -dir migrations postgres "postgres://user:pass@host:5432/webmail" up
            # Start
            export STALWART_URL=http://your-stalwart:8081
            export STALWART_ADMIN_TOKEN=your-admin-token
            export SECRET_ENCRYPTION_KEY=$(openssl rand -hex 32)
            export WEBMAIL_DATABASE_URL=postgres://user:pass@host:5432/webmail
            export VALKEY_URL=redis://host:6379/0
            ./webmail-linux-amd64
            ```

            ---

            ## Configuration Reference

            ### Required
            | Variable | Description |
            |----------|-------------|
            | `STALWART_URL` | Stalwart JMAP endpoint (e.g., `http://localhost:8081`) |
            | `STALWART_ADMIN_TOKEN` | Stalwart admin API token |
            | `SECRET_ENCRYPTION_KEY` | 32-byte hex key for encrypting session credentials. Generate with `openssl rand -hex 32` |
            | `WEBMAIL_DATABASE_URL` | PostgreSQL connection string |
            | `VALKEY_URL` | Redis/Valkey URL for session storage |

            ### Optional: AI Assistant
            | Variable | Description |
            |----------|-------------|
            | `AI_ENABLED` | Set to `true` to enable |
            | `AI_BASE_URL` | OpenAI-compatible API base URL |
            | `AI_API_KEY` | API key |
            | `AI_MODEL` | Model name (e.g., `gpt-4o`, `claude-sonnet-4-20250514`, `gemini-2.0-flash`) |

            ### Optional: Snooze & Scheduled Send (Temporal)

            Snooze and scheduled send require a [Temporal](https://temporal.io) server.
            Without it, everything else works — these two features are simply unavailable.

            ```bash
            # Run Temporal (single container, includes all dependencies):
            docker run -d --name temporal -p 7233:7233 temporalio/auto-setup:latest
            ```

            Then set:
            | Variable | Description |
            |----------|-------------|
            | `TEMPORAL_ADDRESS` | Temporal frontend address (e.g., `localhost:7233`) |

            The webmail registers its own Temporal worker internally — no additional
            worker processes needed.

            ### Optional: Wave Video Calls (TURN)

            Wave calls work peer-to-peer without a TURN server when both parties
            are on the same network. For calls across NATs, configure a TURN relay:

            | Variable | Description |
            |----------|-------------|
            | `TURN_SECRET` | Shared secret for TURN credential generation |
            | `TURN_SERVERS` | TURN server URI (e.g., `turn:your-server:3478`) |

            You can use [coturn](https://github.com/coturn/coturn) as the TURN server.

            ### Other
            | Variable | Default | Description |
            |----------|---------|-------------|
            | `WEBMAIL_LISTEN_ADDR` | `:8095` | HTTP listen address |
            | `WEBMAIL_SESSION_MAX_AGE` | `86400` | Session duration in seconds |
            | `WEBMAIL_MAX_UPLOAD_SIZE` | `26214400` | Max upload size (25MB) |
            | `WEBMAIL_ALLOWED_ORIGINS` | | CORS allowed origins (comma-separated) |
