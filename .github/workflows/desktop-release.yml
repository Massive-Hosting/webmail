name: Desktop Release

on:
  push:
    tags: ['desktop-v*']
  workflow_dispatch:
    inputs:
      skip_signing:
        description: 'Skip code signing (for testing)'
        type: boolean
        default: true

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install desktop dependencies
        run: cd desktop && npm ci

      # Build without signing when secrets are not configured.
      - name: Build Tauri app (unsigned)
        if: ${{ !secrets.APPLE_CERTIFICATE }}
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: desktop
          args: --target aarch64-apple-darwin

      # Build with signing + notarization when secrets are configured.
      - name: Build Tauri app (signed)
        if: ${{ secrets.APPLE_CERTIFICATE }}
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: desktop
          args: --target aarch64-apple-darwin
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - uses: actions/upload-artifact@v4
        with:
          name: macos-aarch64
          path: |
            desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz
            desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz.sig

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Install desktop dependencies
        run: cd desktop && npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: desktop
        env:
          WINDOWS_SIGN_COMMAND: ${{ secrets.WINDOWS_CERT_THUMBPRINT && format('signtool sign /tr http://timestamp.digicert.com /td sha256 /fd sha256 /sha1 {0} "%1"', secrets.WINDOWS_CERT_THUMBPRINT) || '' }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: |
            desktop/src-tauri/target/release/bundle/msi/*.msi
            desktop/src-tauri/target/release/bundle/nsis/*.exe
            desktop/src-tauri/target/release/bundle/msi/*.msi.zip
            desktop/src-tauri/target/release/bundle/msi/*.msi.zip.sig
            desktop/src-tauri/target/release/bundle/nsis/*.nsis.zip
            desktop/src-tauri/target/release/bundle/nsis/*.nsis.zip.sig

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install desktop dependencies
        run: cd desktop && npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: |
            desktop/src-tauri/target/release/bundle/deb/*.deb
            desktop/src-tauri/target/release/bundle/rpm/*.rpm
            desktop/src-tauri/target/release/bundle/appimage/*.AppImage
            desktop/src-tauri/target/release/bundle/appimage/*.AppImage.tar.gz
            desktop/src-tauri/target/release/bundle/appimage/*.AppImage.tar.gz.sig

  publish-release:
    if: startsWith(github.ref, 'refs/tags/desktop-v')
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Generate update manifest
        run: |
          VERSION="${GITHUB_REF_NAME#desktop-v}"
          PUB_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          MACOS_SIG=$(cat artifacts/*aarch64*/*.sig 2>/dev/null || echo "")
          WINDOWS_SIG=$(cat artifacts/*.msi.zip.sig 2>/dev/null || echo "")
          LINUX_SIG=$(cat artifacts/*.AppImage.tar.gz.sig 2>/dev/null || echo "")

          cat > latest.json <<EOF
          {
            "version": "$VERSION",
            "pub_date": "$PUB_DATE",
            "platforms": {
              "darwin-aarch64": {
                "url": "https://github.com/${{ github.repository }}/releases/download/${GITHUB_REF_NAME}/Webmail.app.tar.gz",
                "signature": "$MACOS_SIG"
              },
              "windows-x86_64": {
                "url": "https://github.com/${{ github.repository }}/releases/download/${GITHUB_REF_NAME}/Webmail_${VERSION}_x64-setup.nsis.zip",
                "signature": "$WINDOWS_SIG"
              },
              "linux-x86_64": {
                "url": "https://github.com/${{ github.repository }}/releases/download/${GITHUB_REF_NAME}/Webmail_${VERSION}_amd64.AppImage.tar.gz",
                "signature": "$LINUX_SIG"
              }
            }
          }
          EOF

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.msi
            artifacts/**/*.exe
            artifacts/**/*.AppImage
            artifacts/**/*.deb
            artifacts/**/*.rpm
            latest.json
